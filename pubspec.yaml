name: yum_kart
description: "A food ordering app with Firebase authentication."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.2

  # State Management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2

  # Image caching
  cached_network_image: ^3.4.1

  # Phone auth intl field
  intl_phone_field: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
